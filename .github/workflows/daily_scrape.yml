name: NEPSE Live Scraper

on:
  schedule:
    # Nepal Time: 11:00, 12:00, 13:00, 14:00, 15:00, 17:00 (Sun-Thu)
    # UTC Time: 05:15, 06:15, 07:15, 08:15, 09:15, 11:15
    - cron: '15 5,6,7,8,9,11 * * 0-4'
  workflow_dispatch: # Allows you to run it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # We pass these so scrape.py can talk to Supabase without streamlit
        run: python Services/scrape.py
